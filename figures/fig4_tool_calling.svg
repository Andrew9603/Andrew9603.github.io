<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#07111F"/>
        <stop offset="55%" stop-color="#0B1F33"/>
        <stop offset="100%" stop-color="#111827"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
      </filter>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
        <path d="M2,2 L10,6 L2,10 Z" fill="#8EC5FF"/>
      </marker>
      <style>
        .title{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:40px;font-weight:800;fill:#F8FAFC;}
        .subtitle{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:20px;fill:#B6C2D2;}
        .label{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:25px;font-weight:700;fill:#F8FAFC;}
        .small{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:17px;fill:#C7D2E1;}
        .tiny{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:14px;fill:#94A3B8;}
        .num{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:22px;font-weight:800;fill:#0B1220;}
      </style>
    </defs>
<rect width="1200" height="675" rx="0" fill="url(#bg)"/>
<circle cx="1000" cy="105" r="210" fill="#1D4ED8" opacity="0.10"/>
<circle cx="185" cy="570" r="240" fill="#0EA5E9" opacity="0.08"/>
<text x="60" y="76" class="title">图4  从“写 SQL”到“调用业务工具”</text>
<text x="60" y="112" class="subtitle">高频且复杂的问题不一定要让模型每次重新写 SQL，可以沉淀为稳定工具</text>
<path d="M340 325 C 405 325, 405 325, 470 325" stroke="#8EC5FF" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
<path d="M740 325 C 805 325, 805 325, 870 325" stroke="#8EC5FF" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
<rect x="70" y="175" width="270" height="300" rx="24" fill="#4A1D1D" stroke="#FB7185" stroke-width="2.5" filter="url(#shadow)"/>
<text x="98" y="217" class="label">原始做法</text>
<text x="98" y="257" class="small">用户：查某班 C 语言成绩提升</text>
<text x="98" y="283" class="small">模型：临时拼 8 个 JOIN</text>
<text x="98" y="309" class="small">风险：字段错、逻辑错、慢查询</text>
<text x="98" y="335" class="small">维护：每次都靠模型发挥</text>
<rect x="470" y="175" width="270" height="300" rx="24" fill="#193B2E" stroke="#6EE7B7" stroke-width="2.5" filter="url(#shadow)"/>
<text x="498" y="217" class="label">工具化做法</text>
<text x="498" y="257" class="small">用户：同样的问题</text>
<text x="498" y="283" class="small">模型：识别意图 + 填参数</text>
<text x="498" y="309" class="small">工具：query_score_growth(...)</text>
<text x="498" y="335" class="small">结果：稳定 SQL + 权限控制</text>
<rect x="870" y="175" width="270" height="300" rx="24" fill="#4A2A13" stroke="#FF9F1C" stroke-width="2.5" filter="url(#shadow)"/>
<text x="898" y="217" class="label">工具设计原则</text>
<text x="898" y="257" class="small">少工具、多参数</text>
<text x="898" y="283" class="small">工具可组合，但路径别太长</text>
<text x="898" y="309" class="small">参数强类型校验</text>
<text x="898" y="335" class="small">日志可回放、可评测</text>
<text x="60" y="635" class="tiny">一句话：让模型做它擅长的语义理解，让后端工具做确定性的业务计算。</text>
</svg>