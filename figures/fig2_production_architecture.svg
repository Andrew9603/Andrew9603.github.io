<text x="388" y="437" class="label">业务工具层</text>
<text x="388" y="477" class="small">查课表 / 查学生</text>
<text x="388" y="503" class="small">GMV / 留存率</text>
<text x="388" y="529" class="small">复用已有 API</text>
<text x="60" y="635" class="tiny">关键点：模型负责“推理与调度”，系统负责“权限、执行、安全和可观测”。</text>
</svg>