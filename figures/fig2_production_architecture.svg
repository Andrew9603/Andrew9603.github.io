<path d="M610 460 C 650 460, 650 270, 690 270" stroke="#8EC5FF" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
<path d="M990 355 C 965 355, 965 460, 940 460" stroke="#8EC5FF" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
<rect x="70" y="165" width="220" height="120" rx="24" fill="#123F4A" stroke="#39D7C8" stroke-width="2.5" filter="url(#shadow)"/>
<text x="98" y="207" class="label">用户问题</text>
<text x="98" y="247" class="small">自然语言输入</text>
<text x="98" y="273" class="small">多轮上下文</text>
<rect x="360" y="140" width="250" height="170" rx="24" fill="#302654" stroke="#A78BFA" stroke-width="2.5" filter="url(#shadow)"/>
<text x="388" y="182" class="label">语义检索层</text>
<text x="388" y="222" class="small">Schema / 指标口径</text>
<text x="388" y="248" class="small">Join Path / 示例 SQL</text>
<text x="388" y="274" class="small">业务文档 / API 说明</text>
<rect x="690" y="130" width="250" height="190" rx="24" fill="#173B57" stroke="#3BA7FF" stroke-width="2.5" filter="url(#shadow)"/>
<text x="718" y="172" class="label">SQL 生成 Agent</text>
<text x="718" y="212" class="small">问题拆解</text>
