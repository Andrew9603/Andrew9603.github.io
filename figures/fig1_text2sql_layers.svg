<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#07111F"/>
        <stop offset="55%" stop-color="#0B1F33"/>
        <stop offset="100%" stop-color="#111827"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
      </filter>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
        <path d="M2,2 L10,6 L2,10 Z" fill="#8EC5FF"/>
      </marker>
      <style>
        .title{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:40px;font-weight:800;fill:#F8FAFC;}
        .subtitle{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:20px;fill:#B6C2D2;}
        .label{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:25px;font-weight:700;fill:#F8FAFC;}
        .small{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:17px;fill:#C7D2E1;}
        .tiny{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:14px;fill:#94A3B8;}
        .num{font-family:Inter,'Microsoft YaHei',Arial,sans-serif;font-size:22px;font-weight:800;fill:#0B1220;}
      </style>
    </defs>
<rect width="1200" height="675" rx="0" fill="url(#bg)"/>
<circle cx="1000" cy="105" r="210" fill="#1D4ED8" opacity="0.10"/>
<circle cx="185" cy="570" r="240" fill="#0EA5E9" opacity="0.08"/>
<text x="60" y="76" class="title">图1  Text2SQL 系统的三层演进</text>
<text x="60" y="112" class="subtitle">从“让模型直接写 SQL”，逐步走向可控、可维护的业务工具化系统</text>
<path d="M370 315 C 410 315, 410 315, 450 315" stroke="#8EC5FF" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
<path d="M750 315 C 790 315, 790 315, 830 315" stroke="#8EC5FF" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
<rect x="70" y="190" width="300" height="250" rx="24" fill="#173B57" stroke="#3BA7FF" stroke-width="2.5" filter="url(#shadow)"/>
<circle cx="104" cy="224" r="18" fill="#3BA7FF"/>
<text x="98" y="232" class="num">1</text>
<text x="138" y="232" class="label">第一层：Schema Prompt</text>
<text x="98" y="272" class="small">把表名、字段、类型、索引</text>
<text x="98" y="298" class="small">塞进 Prompt，让模型写 SQL</text>
<text x="98" y="324" class="small">优点：快；缺点：不懂业务</text>
<rect x="450" y="190" width="300" height="250" rx="24" fill="#302654" stroke="#A78BFA" stroke-width="2.5" filter="url(#shadow)"/>
<circle cx="484" cy="224" r="18" fill="#A78BFA"/>
<text x="478" y="232" class="num">2</text>
<text x="518" y="232" class="label">第二层：RAG + Agent</text>
<text x="478" y="272" class="small">先检索相关表和业务文档</text>
<text x="478" y="298" class="small">再由 SQL Agent 生成与修正</text>
<text x="478" y="324" class="small">优点：覆盖更大库；成本上升</text>
<rect x="830" y="190" width="300" height="250" rx="24" fill="#4A2A13" stroke="#FF9F1C" stroke-width="2.5" filter="url(#shadow)"/>
<circle cx="864" cy="224" r="18" fill="#FF9F1C"/>
<text x="858" y="232" class="num">3</text>
<text x="898" y="232" class="label">第三层：业务工具化</text>
<text x="858" y="272" class="small">把高频复杂查询封装成工具</text>
<text x="858" y="298" class="small">Agent 负责选工具和填参数</text>
<text x="858" y="324" class="small">优点：稳定、便宜、可控</text>
<text x="60" y="635" class="tiny">设计建议：Demo 可以从第一层开始，生产系统通常需要第二层和第三层配合。</text>
</svg>